name: Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PDF text scan dependency
        run: |
          python3 -m pip install pypdf
          echo "ARTIST_STUDIO_PYTHON=$(command -v python3)" >> "$GITHUB_ENV"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Project structure verification
        run: npm run test:structure

      - name: Build
        run: npm run build
